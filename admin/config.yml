# ============================================================
#  Configuration de l'administration Créa'Sora (Decap CMS)
#  ⚠️ Remplacez "VOTRE-PSEUDO/VOTRE-DEPOT" par votre dépôt GitHub
#     (exemple : creasora/site-crea-sora)
# ============================================================

backend:
  name: github
  repo: VOTRE-PSEUDO/VOTRE-DEPOT   # ⚠️ à modifier
  branch: main

# Dossier où sont stockées les photos téléversées
media_folder: "images"
public_folder: "/images"

# Langue de l'interface
locale: "fr"

collections:
  # ----- Onglet Réalisations : créations rangées par famille -----
  - name: "boutique"
    label: "Réalisations"
    files:
      - name: "creations"
        label: "Liste des créations"
        file: "products.json"
        fields:
          - label: "Créations"
            name: "creations"
            widget: "list"
            label_singular: "Création"
            summary: "{{fields.titre}} ({{fields.famille}})"
            fields:
              - { label: "Titre du modèle", name: "titre", widget: "string" }
              - label: "Famille (type)"
                name: "famille"
                widget: "relation"
                collection: "catalogue"
                file: "familles"
                value_field: "familles.*.nom"
                search_fields: ["familles.*.nom"]
                display_fields: ["familles.*.nom"]
                hint: "Choisissez le type. La création apparaîtra dans la carte de cette famille."
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Prix", name: "prix", widget: "string", hint: "ex : à partir de 25 €" }
              - { label: "Photo", name: "image", widget: "image", required: false }
              - { label: "Lien Vinted (si en vente)", name: "lien", widget: "string", required: false, hint: "Collez l'adresse de l'annonce Vinted. Laissez vide si c'est juste un exemple sur commande." }

  # ----- Catalogue du formulaire de commande : familles + modèles -----
  - name: "catalogue"
    label: "Catalogue de commande"
    files:
      - name: "familles"
        label: "Familles & modèles"
        file: "catalogue.json"
        fields:
          - label: "Familles"
            name: "familles"
            widget: "list"
            label_singular: "Famille"
            summary: "{{fields.nom}}"
            fields:
              - { label: "Nom de la famille", name: "nom", widget: "string", hint: "ex : Robe, Jupe, Vêtement bébé…" }
              - label: "Modèles"
                name: "modeles"
                widget: "list"
                label_singular: "Modèle"
                summary: "{{fields.nom}}"
                fields:
                  - { label: "Nom du modèle", name: "nom", widget: "string" }
