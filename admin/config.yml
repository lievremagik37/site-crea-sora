# ============================================================
#  Configuration de l'administration Créa'Sora (Decap CMS)
#  ⚠️ Remplacez "VOTRE-PSEUDO/VOTRE-DEPOT" par votre dépôt GitHub
#     (exemple : creasora/site-crea-sora)
# ============================================================

backend:
  name: github
  repo: lievremagik37/site-crea-sora  # ⚠️ à modifier
  branch: main

# Dossier où sont stockées les photos téléversées
media_folder: "images"
public_folder: "/images"

# Langue de l'interface
locale: "fr"

collections:
  # ----- Onglet Réalisations : image de couverture + liste des créations -----
  - name: "boutique"
    label: "Réalisations"
    files:
      - name: "creations"
        label: "Créations & couverture"
        file: "products.json"
        fields:
          - { label: "Image de couverture (onglet Réalisations)", name: "couverture", widget: "image", required: false, hint: "Grande image cliquable. Laissez vide pour un fond pastel par défaut." }
          - label: "Créations"
            name: "creations"
            widget: "list"
            label_singular: "Création"
            summary: "{{fields.titre}} — {{fields.prix}}"
            fields:
              - { label: "Titre", name: "titre", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Prix", name: "prix", widget: "string", hint: "ex : à partir de 25 €" }
              - { label: "Photo", name: "image", widget: "image", required: false }
              - { label: "Lien Vinted (si en vente)", name: "lien", widget: "string", required: false, hint: "Collez l'adresse de l'annonce Vinted. Laissez vide si c'est juste un exemple sur commande." }

  # ----- Catalogue du formulaire de commande : familles + modèles -----
  - name: "catalogue"
    label: "Catalogue de commande"
    files:
      - name: "familles"
        label: "Familles & modèles"
        file: "catalogue.json"
        fields:
          - label: "Familles"
            name: "familles"
            widget: "list"
            label_singular: "Famille"
            summary: "{{fields.nom}}"
            fields:
              - { label: "Nom de la famille", name: "nom", widget: "string", hint: "ex : Robe, Jupe, Vêtement bébé…" }
              - label: "Modèles"
                name: "modeles"
                widget: "list"
                label_singular: "Modèle"
                summary: "{{fields.nom}}"
                fields:
                  - { label: "Nom du modèle", name: "nom", widget: "string" }
