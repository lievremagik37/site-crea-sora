<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Merci ! — Créa'Sora</title>
<style>
  :root{
    --rose:#f7d9d9;--rose-fonce:#e8a9b0;--lavande:#e3dcef;--menthe:#d6ece0;
    --creme:#fff8f3;--texte:#5a4a4a;--texte-doux:#8a7a7a;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:'Segoe UI',-apple-system,system-ui,sans-serif;color:var(--texte);
    background:linear-gradient(135deg,var(--rose),var(--lavande) 55%,var(--menthe));
    min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;
  }
  .box{
    background:#fff;border-radius:26px;padding:48px 40px;max-width:480px;
    box-shadow:0 12px 36px rgba(180,140,150,.25);
  }
  .emoji{font-size:3rem;}
  h1{color:var(--rose-fonce);font-size:1.9rem;margin:14px 0 12px;}
  p{color:var(--texte-doux);font-size:1.05rem;line-height:1.7;}
  a.btn{
    display:inline-block;margin-top:28px;padding:14px 34px;border-radius:40px;
    background:var(--rose-fonce);color:#fff;font-weight:700;text-decoration:none;
    box-shadow:0 6px 20px rgba(232,169,176,.4);transition:transform .2s;
  }
  a.btn:hover{transform:translateY(-2px);}
</style>
</head>
<body>
  <div class="box">
    <div class="emoji">🌸</div>
    <h1>Merci pour votre demande !</h1>
    <p>Votre message a bien été envoyé. Nous reviendrons vers vous très vite
       pour discuter de votre projet sur mesure.</p>
    <a class="btn" href="/">Retour à la boutique</a>
  </div>
</body>
</html>
